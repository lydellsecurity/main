# ==========================================================================
# Lydell Security — Render Blueprint (Infrastructure as Code)
# ==========================================================================
# This file MUST live at the repository root for Render to detect it.
#
# Provisions:
#   1. PostgreSQL 16 database (Basic 256MB plan, Oregon)
#   2. Python cron job running the blog engine Mon/Wed/Fri at 06:00 UTC
#
# Deploy: Render Dashboard → New → Blueprint → Select this repo
# Docs:   https://render.com/docs/infrastructure-as-code
# ==========================================================================

databases:
  - name: lydell-blog-db
    region: oregon
    plan: basic-256mb       # Flexible plan — 256 MB RAM
    databaseName: lydell_blog
    user: lydell_admin
    postgresMajorVersion: "16"
    ipAllowList:            # Allow external connections (Netlify Functions)
      - source: 0.0.0.0/0
        description: All (Netlify Functions run on rotating AWS IPs)

services:
  - type: cron
    name: lydell-blog-engine
    region: oregon
    plan: starter
    runtime: python
    schedule: "0 6 * * 1,3,5"  # Mon/Wed/Fri at 06:00 UTC (2:00 AM EST)
    rootDir: blog-engine    # Render builds from this subdirectory
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      # ── Database (auto-linked from the database above) ────────────
      - key: DATABASE_URL
        fromDatabase:
          name: lydell-blog-db
          property: connectionString

      # ── API Keys (set manually in Render Dashboard after deploy) ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
      - key: NETLIFY_BUILD_HOOK
        sync: false
      - key: SENTRY_DSN
        sync: false

      # ── Runtime Config ────────────────────────────────────────────
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: TOPICS_PER_RUN
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.7"
