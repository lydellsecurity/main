# ==========================================================================
# Lydell Security — Blog Engine — Render Blueprint
# ==========================================================================
# Deploy with: render blueprint apply
# Docs: https://render.com/docs/infrastructure-as-code
#
# This blueprint provisions:
#   1. A PostgreSQL database for blog post storage.
#   2. A cron job that runs the blog engine daily at 06:00 UTC.
# ==========================================================================

databases:
  - name: lydell-blog-db
    region: oregon
    plan: starter  # $7/mo — 1 GB storage, 256 MB RAM
    databaseName: lydell_blog
    user: lydell_admin
    postgresMajorVersion: "16"
    ipAllowList: []  # Allow all (Render internal network)

services:
  - type: cron
    name: lydell-blog-engine
    region: oregon
    plan: starter
    runtime: python
    schedule: "0 6 * * *"  # Daily at 06:00 UTC
    buildCommand: |
      cd blog-engine && pip install -r requirements.txt
    startCommand: |
      cd blog-engine && python main.py
    envVars:
      # ── Database (auto-linked from the database above) ──────────────
      - key: DATABASE_URL
        fromDatabase:
          name: lydell-blog-db
          property: connectionString

      # ── AI Provider ─────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard

      # ── Unsplash ────────────────────────────────────────────────────
      - key: UNSPLASH_ACCESS_KEY
        sync: false

      # ── Netlify ─────────────────────────────────────────────────────
      - key: NETLIFY_BUILD_HOOK
        sync: false

      # ── Observability ───────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false

      # ── Runtime Config ──────────────────────────────────────────────
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.7"
